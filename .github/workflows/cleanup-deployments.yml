name: Cleanup Deployments

on:
  deployment_status:

permissions:
  contents: read
  deployments: write

jobs:
  cleanup:
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Delete old preview and production deployments
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: deployments } = await github.rest.repos.listDeployments({
              owner,
              repo,
              per_page: 100
            });

            const classifyEnvironment = (environment = "") => {
              const value = environment.toLowerCase();

              if (value.includes("production")) return "production";
              if (value.includes("preview")) return "preview";

              return null;
            };

            const groups = {
              production: [],
              preview: []
            };

            for (const deployment of deployments) {
              const group = classifyEnvironment(deployment.environment);
              if (!group) continue;
              groups[group].push(deployment);
            }

            for (const [groupName, groupDeployments] of Object.entries(groups)) {
              const sortedDeployments = groupDeployments.sort(
                (left, right) => new Date(right.created_at) - new Date(left.created_at)
              );

              const keptDeployment = sortedDeployments[0];
              const deploymentsToDelete = sortedDeployments.slice(1);

              core.info(
                `Group ${groupName}: keeping ${keptDeployment ? keptDeployment.id : "none"}, deleting ${deploymentsToDelete.length}`
              );

              for (const deployment of deploymentsToDelete) {
                try {
                  await github.rest.repos.createDeploymentStatus({
                    owner,
                    repo,
                    deployment_id: deployment.id,
                    state: "inactive",
                    description: "Automatically cleaned up old deployment"
                  });
                } catch (error) {
                  core.warning(`Could not mark deployment ${deployment.id} as inactive: ${error.message}`);
                }

                try {
                  await github.rest.repos.deleteDeployment({
                    owner,
                    repo,
                    deployment_id: deployment.id
                  });
                } catch (error) {
                  core.warning(`Could not delete deployment ${deployment.id}: ${error.message}`);
                }
              }
            }
