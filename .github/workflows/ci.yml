name: CI test

on:
  # Validate the main branch after each push.
  push:
    branches:
      - main
  # Run the same checks before merging changes from feature branches.
  pull_request:

jobs:
  verify:
    # A single lightweight verification job is enough for this repo today.
    runs-on: ubuntu-latest
    env:
      # Keep CI logs plain-text so they stay readable in summaries and artifacts.
      FORCE_COLOR: '0'
      NO_COLOR: '1'
      npm_config_color: 'false'
      NODE_ENV: test
      AUTH_SESSION_SECRET: ci-test-secret
      DATABASE_URL: ${{ secrets.DATABASE_URL || secrets.SUPABASE_DB_URL }}

    steps:
      # Download the repository contents into the runner workspace.
      - name: Checkout repository
        uses: actions/checkout@v6

      # Use the same major Node version we target on Vercel and cache npm packages.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # Store command output in a single file so the run can be reviewed end-to-end.
      - name: Prepare CI logs directory
        shell: bash
        run: |
          mkdir -p logs
          : > logs/ci.log

      # Install exactly what is locked in package-lock.json for reproducible CI runs.
      - name: Install dependencies
        shell: bash
        run: |
          {
            echo "===== Install dependencies ====="
            echo
          } | tee -a logs/ci.log
          set -o pipefail
          npm ci --no-fund --no-audit 2>&1 | tee -a logs/ci.log

      # Catch style issues, unused code, and hook-rule violations early.
      - name: Lint
        shell: bash
        run: |
          {
            echo
            echo "===== Lint ====="
            echo
          } | tee -a logs/ci.log
          set -o pipefail
          npm run lint 2>&1 | tee -a logs/ci.log

      # Verify that the TypeScript codebase is still type-safe.
      - name: Typecheck
        shell: bash
        run: |
          {
            echo
            echo "===== Typecheck ====="
            echo
          } | tee -a logs/ci.log
          set -o pipefail
          npm run typecheck 2>&1 | tee -a logs/ci.log

      # Verify the DB-backed public API handlers against the configured CI database.
      - name: DB-backed API tests
        shell: bash
        run: |
          {
            echo
            echo "===== DB-backed API tests ====="
            echo
          } | tee -a logs/ci.log

          if [ -z "$DATABASE_URL" ]; then
            echo "Missing DATABASE_URL or SUPABASE_DB_URL GitHub secret for npm run test:db" | tee -a logs/ci.log
            exit 1
          fi

          set -o pipefail
          npm run test:db 2>&1 | tee -a logs/ci.log

      # Ensure the production bundle can actually be generated.
      - name: Build
        shell: bash
        run: |
          {
            echo
            echo "===== Build ====="
            echo
          } | tee -a logs/ci.log
          set -o pipefail
          npm run build 2>&1 | tee -a logs/ci.log

      # Mirror the full unified log into the Actions run summary as pure markdown.
      - name: Publish CI log summary
        if: always()
        shell: bash
        run: |
          {
            echo "## CI log summary"
            echo
            echo "- Full command output remains visible in each workflow step."
            echo "- The downloadable artifact is still kept as a backup, even though GitHub serves artifacts as zip files."
            echo
            echo "### Checks"
            echo "- \`npm ci --no-fund --no-audit\`"
            echo "- \`npm run lint\`"
            echo "- \`npm run typecheck\`"
            echo "- \`npm run test:db\`"
            echo "- \`npm run build\`"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          for section in "Install dependencies" "Lint" "Typecheck" "DB-backed API tests" "Build"; do
            {
              echo "### ${section}"
              echo '```text'
              awk -v target="$section" '
                $0 == "===== " target " =====" {
                  capture = 1
                  next
                }
                /^===== .* =====$/ {
                  if (capture) exit
                }
                capture { print }
              ' logs/ci.log
              echo '```'
              echo
            } >> "$GITHUB_STEP_SUMMARY"
          done

      # Keep the logs even on failure so the GitHub Actions run is debuggable.
      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ci-logs
          path: logs
          if-no-files-found: error
