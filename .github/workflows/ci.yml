name: CI

on:
  # Validate the main branch after each push.
  push:
    branches:
      - main
  # Run the same checks before merging changes from feature branches.
  pull_request:

jobs:
  verify:
    # A single lightweight verification job is enough for this repo today.
    runs-on: ubuntu-latest
    env:
      # Keep CI logs plain-text so they stay readable in summaries and artifacts.
      FORCE_COLOR: '0'
      NO_COLOR: '1'
      npm_config_color: 'false'

    steps:
      # Download the repository contents into the runner workspace.
      - name: Checkout repository
        uses: actions/checkout@v6

      # Use the same major Node version we target on Vercel and cache npm packages.
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # Store command output in a single file so the run can be reviewed end-to-end.
      - name: Prepare CI logs directory
        shell: bash
        run: |
          mkdir -p logs
          : > logs/ci.log

      # Install exactly what is locked in package-lock.json for reproducible CI runs.
      - name: Install dependencies
        shell: bash
        run: |
          {
            echo "===== Install dependencies ====="
            echo
          } | tee -a logs/ci.log
          set -o pipefail
          npm ci 2>&1 | tee -a logs/ci.log

      # Catch style issues, unused code, and hook-rule violations early.
      - name: Lint
        shell: bash
        run: |
          {
            echo
            echo "===== Lint ====="
            echo
          } | tee -a logs/ci.log
          set -o pipefail
          npm run lint 2>&1 | tee -a logs/ci.log

      # Verify that the TypeScript codebase is still type-safe.
      - name: Typecheck
        shell: bash
        run: |
          {
            echo
            echo "===== Typecheck ====="
            echo
          } | tee -a logs/ci.log
          set -o pipefail
          npm run typecheck 2>&1 | tee -a logs/ci.log

      # Ensure the production bundle can actually be generated.
      - name: Build
        shell: bash
        run: |
          {
            echo
            echo "===== Build ====="
            echo
          } | tee -a logs/ci.log
          set -o pipefail
          npm run build 2>&1 | tee -a logs/ci.log

      # Mirror the full unified log into the Actions run summary.
      - name: Publish CI log summary
        if: always()
        shell: bash
        run: |
          {
            echo "## CI log summary"
            echo
            echo "Each full command log is already visible in the step output above."
            echo "The downloadable artifact is kept as a backup, but GitHub always serves artifacts as zip files."
            echo
            echo "### ci.log"
            echo '```text'
            cat logs/ci.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Keep the logs even on failure so the GitHub Actions run is debuggable.
      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ci-logs
          path: logs
          if-no-files-found: error
