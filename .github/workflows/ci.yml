name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Prepare CI logs directory
        run: mkdir -p logs

      - name: Install dependencies
        shell: bash
        run: |
          set -o pipefail
          npm ci 2>&1 | tee logs/install.log

      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee logs/lint.log

      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee logs/typecheck.log

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee logs/build.log

      - name: Upload CI logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-logs
          path: logs
          if-no-files-found: error
